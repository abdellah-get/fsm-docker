name: Pipeline CI/CD

# Quand ce pipeline doit-il se déclencher ?
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Variables globales
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------
  # TÂCHE 1 : TESTS & SÉCURITÉ
  # ---------------------------------------------------
  security-scan:
    name: 🔒 Scan des secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕵️ Lancer Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-image:
    name: 🐳 Analyse de vulnérabilités (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Récupérer le code
        uses: actions/checkout@v4

      - name: 🔨 Construire l'image localement
        run: docker build -t fsm-image-local ./web-admin

      - name: 🕵️ Analyser l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "fsm-image-local"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

  test:
    name: 🧪 Tests & Vérifications
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-admin

    steps:
      - name: 🛎️ Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./web-admin/package-lock.json"

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🧪 Lancer les tests
        run: npm run test

  # ---------------------------------------------------
  # TÂCHE 2 : CONSTRUCTION DE L'IMAGE DOCKER
  # ---------------------------------------------------
  build-and-push:
    name: 🐳 Construction & Publication Docker
    needs: [test, security-scan, security-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🛎️ Récupérer le code
        uses: actions/checkout@v4

      - name: 🔑 Connexion au registre GitHub (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Préparer les tags de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: 🚀 Construire et Pousser l'image
        uses: docker/build-push-action@v5
        with:
          context: ./web-admin
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------
  # TÂCHE 3 : DÉPLOIEMENT & HEALTH CHECK (Jalon 5)
  # ---------------------------------------------------
  deploy:
    name: 🚀 Déploiement sur Railway
    needs: build-and-push # Bloque le déploiement si le build échoue
    # On ne déploie QUE si on est sur la branche 'main' (pas lors d'une PR)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Récupérer le code
        uses: actions/checkout@v4

      - name: 🚂 Installer Railway CLI
        run: npm i -g @railway/cli

      - name: 📤 Déployer automatiquement
        run: railway up --production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: 🩺 Vérifier la santé du site (Health Check)
        run: |
          echo "Attente du démarrage du serveur sur Railway..."
          sleep 20
          # Remplacer cette URL par la vraie URL Railway de ton application !
          curl -f --retry 5 --retry-delay 10 https://fsm-docker-production.up.railway.app || exit 1
