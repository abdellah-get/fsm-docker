apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsm-app-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: fsm-app
  template:
    metadata:
      labels:
        app: fsm-app
    spec:
      containers:
        - name: nextjs-container
          # 1. On utilise ta vraie image GitHub :
          image: ghcr.io/abdellah-get/fsm-docker:main
          # 2. On autorise K8s à la télécharger depuis internet :
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fsm-secrets
                  key: db_url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: fsm-secrets
                  key: auth_secret
